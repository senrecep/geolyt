name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: geolyt
          POSTGRES_PASSWORD: geolyt
          POSTGRES_DB: geolyt
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck
        env:
          POSTGRES_URL: postgres://geolyt:geolyt@localhost:5432/geolyt
          REDIS_URL: redis://localhost:6379

      - name: Test
        run: bun test
        env:
          POSTGRES_URL: postgres://geolyt:geolyt@localhost:5432/geolyt
          REDIS_URL: redis://localhost:6379
          BETTER_AUTH_SECRET: test-secret-must-be-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3000

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f packages/api/Dockerfile -t geolyt-api:latest .

      - name: Build web image
        run: docker build -f packages/web/Dockerfile -t geolyt-web:latest .

      - name: Build jobs image
        run: docker build -f packages/jobs/Dockerfile -t geolyt-jobs:latest .

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install

      - name: Scan for secrets
        run: bun run secret-scan
